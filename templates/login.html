<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
    /* Reset rápido */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-container {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        width: 90%;
        max-width: 400px;
    }

    h2 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #333;
    }

    input {
        width: 100%;
        padding: 0.9rem;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 1rem;
    }

    button {
        width: 100%;
        padding: 1rem;
        background: #007BFF;
        color: #fff;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
    }

    button:hover {
        background: #0056b3;
    }

    .footer {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #666;
    }

    @media(max-width: 350px) {
        .login-container {
            padding: 1.5rem;
        }
    }
</style>
</head>
<body>
   <div class="login-container">
    <h2>Entrar no Sistema</h2>
    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>
    {% if erro %}
        <p style="color: red; margin-top: 0.5rem; text-align: center;">{{ erro }}</p>
    {% endif %}
    <div class="footer">
        &copy; 2026 Sistema de Permuta
    </div>
</div> 
</body>
</html>
