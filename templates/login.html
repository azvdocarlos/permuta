<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Permuta PM</title>
    <style>
        body { font-family: sans-serif; background: #004a99; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #004a99">Acesso</h2>
        <form method="POST">
            <input type="text" name="usuario" placeholder="Matrícula" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
</body>
</html>
