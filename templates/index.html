<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerar Permuta PM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; border-bottom: 2px solid #004a99; padding-bottom: 10px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #e0e0e0; border-radius: 5px; }
        h3 { margin-top: 0; color: #004a99; font-size: 1.1rem; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[readonly] { background-color: #f9f9f9; color: #555; cursor: pointer; }
        button { width: 100%; padding: 12px; margin-top: 20px; background-color: #004a99; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #003366; }
        .info-data { font-size: 0.8rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerar Permuta</h2>

    <form action="/gerar" method="post">

       <div class="section">
            <h3>Dados do Requerente</h3>
            <label>POSTO</label>
            <select name="posto_req">
              <option value="" selected>Selecione</option>
                <option value="SD">SD</option>
                <option value="CB">CB</option>
                <option value="SGT">SGT</option>
            </select>
            <label>NOME</label>
            <select name="nome_req" id="nome_req" onchange="vincularMatricula('req')">
                <option value="">Selecione o nome...</option>
                <option value="C. AZEVEDO" data-num="31736">C. AZEVEDO</option>
                <option value="BRUNO" data-num="36338">BRUNO</option>
                <option value="FEITOZA" data-num="34946">FEITOZA</option>
                <option value="J. DINIZ" data-num="32690">J. DINIZ</option>
            </select>

            <label>NUMERAL</label>
            <input name="num_req" id="num_req" readonly placeholder="Preenchimento automático">
        </div>

        <div class="section">
            <h3>Dados do Substituto</h3>
            <label>POSTO</label>
            <select name="posto_sub">
              <option value="" selected>Selecione</option>
                <option value="SD">SD</option>
                <option value="CB">CB</option>
                <option value="SGT">SGT</option>
            </select>

            <label>NOME</label>
            <select name="nome_sub" id="nome_sub" onchange="vincularMatricula('sub')">
                <option value="">Selecione o nome...</option>
                <option value="C. AZEVEDO" data-num="31736">C. AZEVEDO</option>
                <option value="BRUNO" data-num="36338">BRUNO</option>
                <option value="FEITOZA" data-num="34946">FEITOZA</option>
                <option value="J. DINIZ" data-num="32690">J. DINIZ</option>
            </select>

            <label>NUMERAL</label>
            <input name="num_sub" id="num_sub" readonly placeholder="Preenchimento automático">
        </div>

        <div class="section">
            <label>SELECIONE A(S) DATA(S)</label>
            <input type="text" name="data" id="calendario" placeholder="Clique para selecionar" required>
            <div class="info-data">Selecione um ou dois dias no calendário.</div>
        </div>

        <button type="submit">Gerar Documento (PDF)</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>

<script>
    // Função de Matrícula
    function vincularMatricula(alvo) {
        const select = document.getElementById('nome_' + alvo);
        const input = document.getElementById('num_' + alvo);
        const matricula = select.options[select.selectedIndex].getAttribute('data-num');
        input.value = matricula ? matricula : "";
    }

    // Configuração do Calendário Multi-Seleção
    flatpickr("#calendario", {
        mode: "multiple",
        maxDate: "31.12.2027",
        dateFormat: "d/m/Y",
        locale: "pt",
        conjunction: " e ", // Une as datas com " e "
        onChange: function(selectedDates, dateStr, instance) {
            // Se houver mais de 2 datas, remove a mais antiga (limita a 2)
            if (selectedDates.length > 2) {
                instance.setDate([selectedDates[selectedDates.length - 2], selectedDates[selectedDates.length - 1]]);
            }
        }
    });
</script>

</body>
</html>
